<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engage 2028 - Pre-Execution Agent Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --green: #059669;
      --amber: #b45309;
      --shadow: 0 14px 38px rgba(15, 23, 42, 0.12);
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #eef4ff 0%, var(--bg) 38%);
      height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .sidebar {
      width: 310px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .create-btn {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #0f172a;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .create-btn:hover { filter: brightness(1.05); }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .group {
      margin-bottom: 14px;
    }

    .group h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 6px 8px;
    }

    .agent-row {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 6px;
      background: transparent;
      transition: all .15s;
    }

    .agent-row:hover {
      border-color: #dbe4f3;
      background: #f5f8ff;
      transform: translateY(-1px);
    }

    .agent-row.active {
      background: #ffffff;
      border-color: #cfdcf0;
      box-shadow: 0 8px 18px rgba(148, 163, 184, 0.2);
    }

    .agent-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .agent-meta { min-width: 0; flex: 1; }
    .agent-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-sub {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      margin-top: 4px;
      display: inline-flex;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
    }
    .pill.pre { background: #fff7ed; color: var(--amber); }
    .pill.run { background: #ecfdf5; color: var(--green); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .studio-top {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
    }

    .studio-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 0;
    }

    .studio-title h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .status-chip {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
    }

    .status-chip.pre { color: var(--amber); background: #fff7ed; border-color: #fed7aa; }
    .status-chip.run { color: var(--green); background: #ecfdf5; border-color: #bbf7d0; }

    .phase-strip {
      padding: 12px 22px 12px;
      border-bottom: 1px solid var(--border);
      background: #f8fbff;
    }

    .progress-wrap {
      border: 1px solid #d8e3f3;
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e9eef8;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      transition: width .2s ease;
    }

    .phase-tabs {
      display: grid;
      grid-template-columns: repeat(6, minmax(180px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 7px;
      margin-bottom: 8px;
    }

    .phase-tab {
      border: 1px solid #d7e3f3;
      background: #fff;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      min-height: 52px;
      text-align: left;
      transition: all .15s;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .phase-tab-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid #c7d6ea;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      color: #475569;
      background: #fff;
    }

    .phase-tab-label {
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .phase-tab:hover { background: #f0f6ff; border-color: #bfd2ea; }
    .phase-tab.active {
      background: #eef5ff;
      color: #0f172a;
      border-color: #93b2df;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.18);
    }

    .phase-tab.active .phase-tab-num {
      background: #1d4ed8;
      color: #fff;
      border-color: #1d4ed8;
    }

    .modules {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #fff;
      border: 1px solid #d8e3f3;
      border-radius: 12px;
      padding: 8px;
    }

    .module-btn {
      border: 1px solid #d7e3f3;
      background: #f9fbff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      color: #334155;
      cursor: pointer;
      transition: all .15s;
    }

    .module-btn:hover {
      background: #f3f8ff;
      border-color: #bfd2ea;
    }

    .module-btn.active {
      background: #ecf3ff;
      border-color: #9eb9e1;
      color: #1e3a8a;
      font-weight: 600;
    }

    .workspace {
      flex: 1;
      overflow-y: auto;
      padding: 22px 22px 130px;
    }

    .thread {
      max-width: 860px;
      margin: 0 auto;
    }

    .msg {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg-body {
      flex: 1;
      min-width: 0;
    }

    .msg-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .msg-content {
      border: 1px solid var(--border);
      border-radius: 13px;
      background: #fff;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.65;
      color: #1f2937;
    }

    .msg-content ul { margin: 8px 0 0 18px; }

    .composer {
      position: sticky;
      bottom: 0;
      border-top: 1px solid var(--border);
      background: linear-gradient(transparent, #f6f8fc 22%, #f6f8fc 100%);
      padding: 10px 22px 18px;
    }

    .suggestions {
      max-width: 860px;
      margin: 0 auto 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion {
      border: 1px solid #d7e3f3;
      background: #fff;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 11px;
      color: #334155;
      cursor: pointer;
    }

    .input-box {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid #cfdbeb;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 15px;
      box-shadow: var(--shadow);
      padding: 8px 10px 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .composer-tools {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .right-tools {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .tool-btn {
      border: 1px solid #d7e3f3;
      background: #fff;
      color: #334155;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .tool-btn:hover {
      background: #f3f8ff;
      border-color: #bfd2ea;
    }

    .tool-btn.active {
      border-color: #fca5a5;
      background: #fff1f2;
      color: #b91c1c;
      animation: pulseMic 1.2s infinite;
    }

    @keyframes pulseMic {
      0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.35); }
      70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }

    .attachment-tray {
      max-width: 860px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .attachment-chip {
      border: 1px solid #d7e3f3;
      background: #fff;
      color: #334155;
      border-radius: 999px;
      font-size: 11px;
      padding: 5px 9px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .attachment-chip button {
      border: 0;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }

    .voice-indicator {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #b91c1c;
      border-radius: 999px;
      font-size: 11px;
      padding: 5px 9px;
      display: none;
    }

    .voice-indicator.show { display: inline-flex; }

    textarea {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      font: inherit;
      font-size: 14px;
      line-height: 1.45;
      resize: none;
      max-height: 120px;
      min-height: 36px;
      padding: 7px 2px;
      color: var(--text);
    }

    .send {
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #0f172a;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .send:disabled { opacity: .35; cursor: default; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-mark">E</div>Engage AI Studio</div>
      <button class="create-btn" id="createBtn">Create New Business Agent</button>
    </div>
    <div class="sidebar-body">
      <div class="group">
        <h4>Pre-Execution Agents</h4>
        <div id="preList"></div>
      </div>
      <div class="group">
        <h4>Running Agents</h4>
        <div id="runList"></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <section class="studio-top">
      <div class="studio-title">
        <h1 id="agentTitle">Select an Agent</h1>
        <span class="status-chip" id="agentStatus">Status</span>
      </div>
    </section>

    <section class="phase-strip" id="phaseStrip">
      <div class="progress-wrap">
        <div class="progress-head">
          <span id="progressLabel">Pre-Execution Progress</span>
          <span id="progressText">Phase 1 of 6</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="phase-tabs" id="phaseTabs"></div>
      <div class="modules" id="moduleButtons"></div>
    </section>

    <section class="workspace" id="workspace">
      <div class="thread" id="thread"></div>
    </section>

    <section class="composer">
      <div class="suggestions" id="suggestions"></div>
      <div class="attachment-tray" id="attachmentTray">
        <div class="voice-indicator" id="voiceIndicator">Listening...</div>
      </div>
      <div class="input-box">
        <div class="composer-tools">
          <button class="tool-btn" id="attachBtn" title="Attach files">+</button>
        </div>
        <textarea id="input" rows="1" placeholder="Ask this business agent..."></textarea>
        <div class="right-tools">
          <button class="tool-btn" id="micBtn" title="Speak">🎙</button>
          <button class="send" id="sendBtn">↑</button>
        </div>
      </div>
      <input type="file" id="fileInput" multiple class="hidden" />
    </section>
  </main>

  <script>
    const PHASES = [
      { id: "p1", title: "1. Planning Phase Agent(s)", modules: [
        { id: "objective", label: "Objective Clarification Agent(s)" },
        { id: "audience-data", label: "Agent(s) to Fetch Audience Data and Variable Values" },
        { id: "channel-precheck", label: "Organization Channel Pre-Check Agent(s)" },
      ]},
      { id: "p2", title: "2. Create Business Journey (without Configurations) Agent(s)", modules: [
        { id: "brief-outcome", label: "Journey Brief and Outcome Agent" },
        { id: "touchpoint-planner", label: "Channel and Touchpoint Planner Agent(s)" },
        { id: "design-journey", label: "Design Business Journey Agent" },
        { id: "idea-generator", label: "User Communication Idea Generator Agent(s) (SMS, WhatsApp, IVR, Voicebot)" },
      ]},
      { id: "p3", title: "3. Business Journey Node Configuration Agents", modules: [
        { id: "trigger-node", label: "Trigger Node Configuration Agent(s)" },
        { id: "template-creation", label: "Template Creation Agent(s)" },
        { id: "action-nodes", label: "Configure Action Nodes (SMS / WhatsApp / IVR / Voicebot / Dialler) Agent(s)" },
        { id: "process-node", label: "Configure Process Node Configuration Agent(s)" },
        { id: "end-node", label: "End Node Agent(s)" },
      ]},
      { id: "p4", title: "4. Test Business Journey Agent(s)", modules: [
        { id: "test-journey", label: "Test Business Journey Agent(s)" },
      ]},
      { id: "p5", title: "5. Business Journey Execution Checks and Validation Agent(s)", modules: [
        { id: "execution-validation", label: "Business Journey Execution Checks and Validation Agent(s)" },
        { id: "genai-defaults", label: "Estimate Default Values of Gen AI Variables" },
      ]},
      { id: "p6", title: "6. Go Live", modules: [
        { id: "approval-plan", label: "Get Customer Approval on Business Journey Execution Plan" },
      ]},
    ];

    const PRE_TEMPLATES = [
      { name: "Retention Agent", color: "#7c3aed", initials: "RA", objective: "Reduce churn by 20%" },
      { name: "Lifecycle Engagement Agent", color: "#0ea5e9", initials: "LE", objective: "Improve lifecycle conversion quality" },
      { name: "Collections Strategy Agent", color: "#059669", initials: "CS", objective: "Improve collections recovery by 18%" },
    ];

    let AGENTS = {
      "main-collections": {
        id: "main-collections",
        name: "Main Collections Agent",
        initials: "MC",
        color: "#0f766e",
        lifecycle: "pre",
        objective: "Improve collections recovery by 18%",
        inputs: "Audience lake, payment behavior, historical outreach logs",
        guardrails: "Budget caps, channel policy, compliance constraints",
        suggestions: ["Open Planning Phase", "Open Node Configuration", "Go live now"],
      },
      "main-onboarding": {
        id: "main-onboarding",
        name: "Main Onboarding Agent",
        initials: "MO",
        color: "#2563eb",
        lifecycle: "pre",
        objective: "Raise onboarding activation to 72%",
        inputs: "KYC events, app session patterns, drop-off cohorts",
        guardrails: "Approved channel permissions, communication frequency limits",
        suggestions: ["Open Objective Clarification", "Open Test Journey", "Review go-live checklist"],
      },
      "collections-running": {
        id: "collections-running",
        name: "Collections Agent",
        initials: "CA",
        color: "#059669",
        lifecycle: "running",
        objective: "Drive day-to-day collection outcomes",
        inputs: "Live orchestration telemetry",
        guardrails: "Running budget policy",
        suggestions: ["Show execution updates", "Why did performance change?", "Show ROI trend"],
      },
      "support-running": {
        id: "support-running",
        name: "Proactive Support Agent",
        initials: "PS",
        color: "#d97706",
        lifecycle: "running",
        objective: "Prevent avoidable support escalations",
        inputs: "Intent signals and support telemetry",
        guardrails: "Escalation policy and workforce constraints",
        suggestions: ["Show at-risk users", "Optimize channel mix", "Explain latest actions"],
      },
    };

    let currentAgentId = null;
    let currentPhaseByAgent = {};
    let currentModuleByAgent = {};

    const preList = document.getElementById("preList");
    const runList = document.getElementById("runList");
    const phaseStrip = document.getElementById("phaseStrip");
    const phaseTabs = document.getElementById("phaseTabs");
    const moduleButtons = document.getElementById("moduleButtons");
    const progressLabel = document.getElementById("progressLabel");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const thread = document.getElementById("thread");
    const suggestions = document.getElementById("suggestions");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const attachBtn = document.getElementById("attachBtn");
    const micBtn = document.getElementById("micBtn");
    const fileInput = document.getElementById("fileInput");
    const attachmentTray = document.getElementById("attachmentTray");
    const voiceIndicator = document.getElementById("voiceIndicator");

    let attachedFiles = [];
    let isRecording = false;
    let recognition = null;

    function byLifecycle(type) {
      return Object.values(AGENTS).filter(a => a.lifecycle === type);
    }

    function renderSidebar() {
      const renderRows = (agents) => agents.map(agent => `
        <div class="agent-row ${agent.id === currentAgentId ? "active" : ""}" onclick="selectAgent('${agent.id}')">
          <div class="agent-icon" style="background:${agent.color}">${agent.initials}</div>
          <div class="agent-meta">
            <div class="agent-name">${agent.name}</div>
            <div class="agent-sub">${agent.objective}</div>
            <div class="pill ${agent.lifecycle === "pre" ? "pre" : "run"}">${agent.lifecycle === "pre" ? "Pre-Execution" : "Running"}</div>
          </div>
        </div>
      `).join("");
      preList.innerHTML = renderRows(byLifecycle("pre"));
      runList.innerHTML = renderRows(byLifecycle("running"));
    }

    function setTopPanel(agent) {
      document.getElementById("agentTitle").textContent = agent.name;
      const status = document.getElementById("agentStatus");
      status.textContent = agent.lifecycle === "pre" ? "Pre-Execution Studio" : "Running Agent Workspace";
      status.className = `status-chip ${agent.lifecycle === "pre" ? "pre" : "run"}`;
    }

    function renderAttachmentTray() {
      const chips = attachedFiles.map((file, idx) =>
        `<span class="attachment-chip">📎 ${escapeHtml(file.name)} <button onclick="removeAttachment(${idx})">×</button></span>`
      ).join("");
      attachmentTray.innerHTML = `<div class="voice-indicator ${isRecording ? "show" : ""}" id="voiceIndicator">Listening...</div>${chips}`;
    }

    function removeAttachment(index) {
      attachedFiles.splice(index, 1);
      renderAttachmentTray();
      updateSendState();
    }

    window.removeAttachment = removeAttachment;

    function updateSendState() {
      sendBtn.disabled = !input.value.trim() && attachedFiles.length === 0;
    }

    function renderPhases(agent) {
      if (agent.lifecycle !== "pre") {
        phaseStrip.classList.add("hidden");
        return;
      }
      phaseStrip.classList.remove("hidden");
      const activePhase = currentPhaseByAgent[agent.id] || PHASES[0].id;
      currentPhaseByAgent[agent.id] = activePhase;

      phaseTabs.innerHTML = PHASES.map((phase, idx) => `
        <button class="phase-tab ${phase.id === activePhase ? "active" : ""}" onclick="setPhase('${phase.id}')">
          <span class="phase-tab-num">${idx + 1}</span>
          <span class="phase-tab-label">${phase.title.replace(/^\d+\.\s*/, "")}</span>
        </button>
      `).join("");

      const selected = PHASES.find(p => p.id === activePhase) || PHASES[0];
      const selectedModule = currentModuleByAgent[agent.id];
      moduleButtons.innerHTML = selected.modules.map(m => `
        <button class="module-btn ${selectedModule === m.id ? "active" : ""}" onclick="openModule('${selected.id}','${m.id}','${escapeHtml(m.label)}')">${m.label}</button>
      `).join("");

      const activeIndex = PHASES.findIndex(p => p.id === activePhase);
      const safeIndex = activeIndex < 0 ? 0 : activeIndex;
      const pct = ((safeIndex + 1) / PHASES.length) * 100;
      progressLabel.textContent = `${agent.name} · Pre-Execution Progress`;
      progressText.textContent = `Phase ${safeIndex + 1} of ${PHASES.length}`;
      progressFill.style.width = `${pct}%`;
    }

    function escapeHtml(s) {
      return s.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll("'", "&#39;").replaceAll('"', "&quot;");
    }

    function message(role, name, avatar, color, html) {
      const bubble = document.createElement("div");
      bubble.className = "msg";
      bubble.innerHTML = `
        <div class="avatar" style="background:${color}">${avatar}</div>
        <div class="msg-body">
          <div class="msg-name">${name}</div>
          <div class="msg-content">${html}</div>
        </div>`;
      thread.appendChild(bubble);
      document.getElementById("workspace").scrollTop = document.getElementById("workspace").scrollHeight;
    }

    function openModule(phaseId, moduleId, moduleLabel) {
      const agent = AGENTS[currentAgentId];
      currentPhaseByAgent[agent.id] = phaseId;
      currentModuleByAgent[agent.id] = moduleId;
      renderPhases(agent);

      message("user", "You", "US", "#6366f1", `<p>Open module: <strong>${moduleLabel}</strong></p>`);
      message("agent", agent.name, agent.initials, agent.color, moduleReply(agent, phaseId, moduleId));
    }

    function moduleReply(agent, phaseId, moduleId) {
      const replies = {
        "objective": `<p>Objective clarification is now active. I mapped your business goal to measurable KPIs, cost constraints, and review cadence.</p>`,
        "audience-data": `<p>Audience data fetch module is active.</p><ul><li>Connected approved data systems</li><li>Resolved customer variable coverage</li><li>Flagged missing values for default estimation in Phase 5</li></ul>`,
        "channel-precheck": `<p>Organization channel pre-check complete. WhatsApp and SMS are ready; IVR needs peak-hour throughput confirmation.</p>`,
        "brief-outcome": `<p>Journey brief drafted with target outcome, ROI goal, and business success criteria.</p>`,
        "touchpoint-planner": `<p>Touchpoint plan prepared: WhatsApp-first, SMS fallback, voice escalation under policy thresholds.</p>`,
        "design-journey": `<p>Business journey design drafted with branch logic and measurable outcomes. Ready for node-level configuration.</p>`,
        "idea-generator": `<p>Communication ideas generated for SMS, WhatsApp, IVR, and Voicebot with policy-safe variants.</p>`,
        "trigger-node": `<p>Trigger node configuration started using event, time, and behavior trigger conditions.</p>`,
        "template-creation": `<p>Reusable templates generated for recurring journey patterns to reduce future setup effort.</p>`,
        "action-nodes": `<p>Action node configuration ready for SMS, WhatsApp, IVR, Voicebot, and Dialler with fallback controls.</p>`,
        "process-node": `<p>Process nodes configured for waits, branching, retries, and escalation governance.</p>`,
        "end-node": `<p>End nodes mapped for success, timeout, and exception closures with learning hooks.</p>`,
        "test-journey": `<p>Test pack initialized across happy path, fallback path, and failure path simulations.</p>`,
        "execution-validation": `<p>Execution checks validated against channel readiness, resource constraints, and policy compliance.</p>`,
        "genai-defaults": `<p>Estimated default values for Gen AI variables based on historical distributions and confidence limits.</p>`,
        "approval-plan": `<p>Customer approval package is ready: business objective, journey plan, controls, and rollback guidance.</p>`,
      };
      return replies[moduleId] || `<p>${phaseId} / ${moduleId} is ready for updates.</p>`;
    }

    function renderSuggestions(agent) {
      suggestions.innerHTML = agent.suggestions.map(s => `<button class="suggestion" onclick="quickSend('${escapeHtml(s)}')">${s}</button>`).join("");
    }

    function setPhase(phaseId) {
      const agent = AGENTS[currentAgentId];
      if (!agent || agent.lifecycle !== "pre") return;
      currentPhaseByAgent[agent.id] = phaseId;
      currentModuleByAgent[agent.id] = null;
      renderPhases(agent);
    }

    function selectAgent(agentId) {
      currentAgentId = agentId;
      const agent = AGENTS[agentId];
      renderSidebar();
      setTopPanel(agent);
      renderPhases(agent);
      renderSuggestions(agent);
      thread.innerHTML = "";

      if (agent.lifecycle === "pre") {
        message("user", "You", "US", "#6366f1", `<p>Let's continue building this pre-execution agent. Open any phase tab and module.</p>`);
        message("agent", agent.name, agent.initials, agent.color, `<p>Pre-Execution Studio ready.</p><ul><li>Use the 6 tabs on top for phase-level navigation</li><li>Each tab has sub-module agent threads</li><li>You can revise any module before go-live</li></ul>`);
      } else {
        message("user", "You", "US", "#6366f1", `<p>Open running workspace for ${agent.name}.</p>`);
        message("agent", agent.name, agent.initials, agent.color, `<p>Running agent workspace is active.</p><p>We'll do a dedicated redesign for running agents next, as you requested.</p>`);
      }
    }

    function quickSend(text) {
      input.value = text;
      sendBtn.disabled = false;
      sendMessage();
    }

    function maybePromote(agent, text) {
      const lower = text.toLowerCase();
      if (agent.lifecycle !== "pre") return false;
      if (!(lower.includes("go live") || lower.includes("approve") || lower.includes("launch") || lower.includes("deploy"))) return false;
      agent.lifecycle = "running";
      agent.suggestions = ["Show execution snapshot", "Explain optimization decisions", "Show ROI trend"];
      message("agent", agent.name, agent.initials, agent.color, `<p>Approved. This pre-execution agent is now promoted to <strong>Running Agent</strong> and handed to Central Orchestration & Execution.</p>`);
      renderSidebar();
      setTopPanel(agent);
      renderPhases(agent);
      renderSuggestions(agent);
      return true;
    }

    function sendMessage() {
      const text = input.value.trim();
      if ((!text && attachedFiles.length === 0) || !currentAgentId) return;
      const agent = AGENTS[currentAgentId];
      input.value = "";
      const attachmentSummary = attachedFiles.length > 0
        ? `<p><strong>Attachments:</strong> ${attachedFiles.map(f => escapeHtml(f.name)).join(", ")}</p>`
        : "";
      message("user", "You", "US", "#6366f1", `<p>${escapeHtml(text || "Shared files/voice input.")}</p>${attachmentSummary}`);
      attachedFiles = [];
      renderAttachmentTray();
      updateSendState();
      if (maybePromote(agent, text)) return;
      message("agent", agent.name, agent.initials, agent.color, `<p>Understood. I can open any tab/module, regenerate journey components, or run validation before go-live.</p>`);
    }

    input.addEventListener("input", () => {
      updateSendState();
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener("click", sendMessage);

    attachBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      const files = Array.from(e.target.files || []);
      attachedFiles.push(...files);
      renderAttachmentTray();
      updateSendState();
      fileInput.value = "";
    });

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return null;
      const sr = new SpeechRecognition();
      sr.interimResults = true;
      sr.continuous = true;
      sr.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          transcript += event.results[i][0].transcript;
        }
        if (transcript.trim()) {
          input.value = transcript.trim();
          input.dispatchEvent(new Event("input"));
        }
      };
      sr.onend = () => {
        isRecording = false;
        micBtn.classList.remove("active");
        renderAttachmentTray();
      };
      return sr;
    }

    recognition = setupSpeechRecognition();

    micBtn.addEventListener("click", () => {
      if (isRecording) {
        isRecording = false;
        micBtn.classList.remove("active");
        if (recognition) recognition.stop();
        renderAttachmentTray();
        return;
      }

      isRecording = true;
      micBtn.classList.add("active");
      renderAttachmentTray();

      if (recognition) {
        recognition.start();
      } else {
        // Fallback: simulate voice capture state only.
        setTimeout(() => {
          if (!isRecording) return;
          input.value = input.value ? `${input.value} [voice note]` : "[voice note]";
          input.dispatchEvent(new Event("input"));
          isRecording = false;
          micBtn.classList.remove("active");
          renderAttachmentTray();
        }, 1400);
      }
    });

    document.getElementById("createBtn").addEventListener("click", () => {
      const t = PRE_TEMPLATES[Math.floor(Math.random() * PRE_TEMPLATES.length)];
      const id = `${t.name.toLowerCase().replaceAll(" ", "-")}-${Date.now()}`;
      AGENTS[id] = {
        id,
        name: `${t.name} (Custom)`,
        initials: t.initials,
        color: t.color,
        lifecycle: "pre",
        objective: t.objective,
        inputs: "Approved enterprise data systems and tools",
        guardrails: "Policy, compliance, permissions, budget, and operational boundaries",
        suggestions: ["Open Planning Phase", "Open Create Business Journey", "Open Go Live tab"],
      };
      selectAgent(id);
    });

    selectAgent("main-collections");
    renderAttachmentTray();
    updateSendState();
  </script>
</body>
</html>
